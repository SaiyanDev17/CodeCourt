services:
  # Express API (Docker)
  api:
    build:
      context: ./backend
      dockerfile: docker/Dockerfile
    user: "0:0"
    ports:
      - "5001:5000"  # External port 5001 maps to internal port 5000
    environment:
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - FRONTEND_URL=http://localhost:3000
    env_file:
      - ./backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - redis
    networks:
      - codecourt-network

  # FastAPI AI Service
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - EXPRESS_API_URL=http://api:5000
    env_file:
      - ./ai-service/.env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - api
    networks:
      - codecourt-network

  # Redis
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction", "--save", "900", "1"]
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - codecourt-network

volumes:
  redis-data:

networks:
  codecourt-network:
    driver: bridge
