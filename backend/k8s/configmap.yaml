# ConfigMap for non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: codecourt-config
  namespace: codecourt
data:
  PORT: "5000"
  NODE_ENV: "production"
  REDIS_URL: "redis://redis-service:6379"
  AI_SERVICE_URL: "http://ai-service:8000"
  FRONTEND_URL: "https://codecourt.example.com"
  AWS_REGION: "us-east-1"
  S3_BUCKET_NAME: "codecourt-test-cases"
  K8S_NAMESPACE: "codecourt"
