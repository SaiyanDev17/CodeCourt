# Example secrets template - DO NOT commit with real values
# Create actual secrets using: kubectl create secret generic codecourt-secrets --from-literal=...
apiVersion: v1
kind: Secret
metadata:
  name: codecourt-secrets
  namespace: codecourt
type: Opaque
stringData:
  MONGODB_URI: "mongodb+srv://user:password@cluster.mongodb.net/codecourt?retryWrites=true&w=majority"
  ACCESS_TOKEN_SECRET: "changeme_access_secret_min_32_chars"
  REFRESH_TOKEN_SECRET: "changeme_refresh_secret_min_32_chars"
  AWS_ACCESS_KEY_ID: "your_aws_access_key"
  AWS_SECRET_ACCESS_KEY: "your_aws_secret_key"
  GROQ_API_KEY: "your_groq_api_key"
