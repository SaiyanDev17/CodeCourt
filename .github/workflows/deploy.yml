name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/codecourt-api:${{ github.sha }} -f backend/docker/Dockerfile backend/
          docker push ghcr.io/${{ github.repository_owner }}/codecourt-api:${{ github.sha }}

      - name: Build and push AI service image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/codecourt-ai:${{ github.sha }} ai-service/
          docker push ghcr.io/${{ github.repository_owner }}/codecourt-ai:${{ github.sha }}

      - name: Build and push C++ judge image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/codecourt-judge-cpp:${{ github.sha }} backend/docker/judges/cpp/
          docker push ghcr.io/${{ github.repository_owner }}/codecourt-judge-cpp:${{ github.sha }}

      - name: Build and push Python judge image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/codecourt-judge-python:${{ github.sha }} backend/docker/judges/python/
          docker push ghcr.io/${{ github.repository_owner }}/codecourt-judge-python:${{ github.sha }}

      - name: Deploy to Kubernetes
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_OKE }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f backend/k8s/
