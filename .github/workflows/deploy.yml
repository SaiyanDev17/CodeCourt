name: Deploy to Production

on:
  push:
    branches:
      - main
      - develop
      - test/verify-ci-pipeline
  pull_request:
    branches:
      - main
      - develop
      - test/verify-ci-pipeline

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      KUBECONFIG_OKE: ${{ secrets.KUBECONFIG_OKE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push API image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$REPO_OWNER/codecourt-api
          docker build -t $IMAGE_ID:${{ github.sha }} -f backend/docker/Dockerfile backend/
          docker push $IMAGE_ID:${{ github.sha }}

      - name: Build and push AI service image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$REPO_OWNER/codecourt-ai
          docker build -t $IMAGE_ID:${{ github.sha }} ai-service/
          docker push $IMAGE_ID:${{ github.sha }}

      - name: Build and push C++ judge image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$REPO_OWNER/codecourt-judge-cpp
          docker build -t $IMAGE_ID:${{ github.sha }} backend/docker/judges/cpp/
          docker push $IMAGE_ID:${{ github.sha }}

      - name: Build and push Python judge image
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_ID=ghcr.io/$REPO_OWNER/codecourt-judge-python
          docker build -t $IMAGE_ID:${{ github.sha }} backend/docker/judges/python/
          docker push $IMAGE_ID:${{ github.sha }}

      - name: Deploy to Kubernetes
        if: env.KUBECONFIG_OKE != ''
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_OKE }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > kubeconfig
          export KUBECONFIG=./kubeconfig
          kubectl apply -f backend/k8s/
